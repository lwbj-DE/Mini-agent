<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<!-- marked.js — GFM Markdown 渲染 -->
<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
<!-- highlight.js — 代码语法高亮 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" id="hljs-light">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark-dimmed.min.css" id="hljs-dark" disabled>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/es/highlight.min.js"></script>
</head>
<body>

<div class="app" id="app">

  <!-- ============= SIDEBAR ============= -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a4 4 0 0 1 4 4v1h2a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h2V6a4 4 0 0 1 4-4z"/>
          <circle cx="9" cy="13" r="1"/><circle cx="15" cy="13" r="1"/>
          <path d="M9 17c.83.67 1.83 1 3 1s2.17-.33 3-1"/>
        </svg>
        <span class="logo-text">Mini Agent</span>
      </div>
      <button class="btn-new-chat" id="btnNewChat" title="新建对话">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        <span>新对话</span>
      </button>
    </div>

    <div class="session-list" id="sessionList">
      <!-- JS 动态填充 -->
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-footer-row">
        <span class="status-dot"></span>
        <span class="status-text">MiMo v2.5 Pro</span>
      </div>
      <!-- 主题切换 -->
      <button class="btn-theme-toggle" id="btnThemeToggle" title="切换主题">
        <span class="theme-icon-light">☀️</span>
        <span class="theme-icon-dark">🌙</span>
        <span class="theme-label">浅色模式</span>
      </button>
    </div>
  </aside>

  <!-- ============= 主聊天区 ============= -->
  <main class="chat-main">

    <!-- 移动端顶栏 -->
    <div class="chat-topbar">
      <button class="btn-sidebar-toggle" id="btnSidebarToggle" title="切换侧栏">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="chat-topbar-title" id="chatTitle">Mini Agent</span>
    </div>

    <!-- 消息区域 -->
    <div class="messages-container" id="messagesContainer">
      <div class="messages-wrapper" id="messagesWrapper">

        <!-- 欢迎页 / 空状态 -->
        <div class="welcome" id="welcomeScreen">
          <div class="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a4 4 0 0 1 4 4v1h2a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h2V6a4 4 0 0 1 4-4z"/>
              <circle cx="9" cy="13" r="1"/><circle cx="15" cy="13" r="1"/>
              <path d="M9 17c.83.67 1.83 1 3 1s2.17-.33 3-1"/>
            </svg>
          </div>
          <h2>有什么我可以帮你的？</h2>
          <div class="welcome-suggestions">
            <button class="suggestion-chip" data-prompt="计算 123 × 456 + 789">
              <span class="chip-icon">🔢</span> 计算 123 × 456 + 789
            </button>
            <button class="suggestion-chip" data-prompt="搜索 AI Agent 相关的信息">
              <span class="chip-icon">🔍</span> 什么是 AI Agent？
            </button>
            <button class="suggestion-chip" data-prompt="帮我制定一个学习 Rust 的 5 步学习计划">
              <span class="chip-icon">📋</span> 制定 Rust 学习路线
            </button>
          </div>
        </div>

        <!-- 动态消息插入点 -->
      </div>
    </div>

    <!-- 输入区域 -->
    <div class="input-area">
      <div class="input-wrapper" id="inputWrapper">
        <!-- 模式选择器 -->
        <div class="mode-selector-wrapper">
          <button class="mode-selector-btn" id="modeSelectorBtn">
            <span id="currentModeText">⚡ 快速</span>
            <svg class="mode-dropdown-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="mode-dropdown" id="modeDropdown">
            <div class="mode-dropdown-item active" data-mode="react">
              <span class="mode-item-icon">⚡</span>
              <div>
                <div class="mode-item-title">快速对话</div>
                <div class="mode-item-desc">直接问答，边想边做</div>
              </div>
            </div>
            <div class="mode-dropdown-item" data-mode="plan_execute">
              <span class="mode-item-icon">📋</span>
              <div>
                <div class="mode-item-title">规划执行</div>
                <div class="mode-item-desc">先规划再执行，适合复杂任务</div>
              </div>
            </div>
          </div>
        </div>
        <textarea
          id="chatInput"
          placeholder="发送消息…"
          rows="1"
          autofocus
        ></textarea>
        <button class="btn-send" id="btnSend" title="发送">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Mini Agent 可能产生错误，请核实重要信息。</p>
    </div>

  </main>
</div>

<!-- App modules — 按依赖顺序加载 -->
<script src="/js/renderer.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/sessions.js"></script>
<script src="/js/chat.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
